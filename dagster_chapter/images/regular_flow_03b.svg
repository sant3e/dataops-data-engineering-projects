  <rect x="735" y="354" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="845" y="370" class="edge-text" text-anchor="middle">daemon evaluates rule for mart_c</text>
