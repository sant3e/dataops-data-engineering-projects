  <text x="50" y="577" class="footer-text" font-weight="600">Daemon rule:</text>
  <text x="160" y="577" class="footer-mono">(code_version_change) OR (eager_with_lookback)</text>
  <text x="50" y="598" class="footer-text">For mart_c@04-25: code_version_change = FALSE, eager_with_lookback = TRUE (stg_b just finished, both deps present) → submit run.</text>
