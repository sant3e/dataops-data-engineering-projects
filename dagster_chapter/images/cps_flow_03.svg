<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 760" width="1340" height="760" style="background:#1a1b26">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa2f7"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f7768e"/>
    </marker>
    <style>
      .name { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; text-anchor: middle; }
      .tag-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .edge-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #c0caf5; }
      .footer-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #c0caf5; }
      .footer-mono { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 12px; fill: #c0caf5; }
      .edge { stroke: #7aa2f7; stroke-width: 2; fill: none; }
      .edge-skip { stroke: #565f89; stroke-width: 2; stroke-dasharray: 5 4; fill: none; }
      .edge-cps-read { stroke: #f7768e; stroke-width: 2; stroke-dasharray: 5 4; fill: none; }
      .edge-cps-write { stroke: #f7768e; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <rect width="1340" height="760" fill="#1a1b26"/>

  <!-- ===== Row 1: source_a + daemon callout + stg_a ===== -->

  <!-- daemon callout source_a -->
  <rect x="60" y="25" width="240" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="180" y="41" class="edge-text" text-anchor="middle">daemon evaluates rule for source_a</text>
  <text x="180" y="57" class="edge-text" text-anchor="middle">source_a is not daemon-managed</text>
  <text x="180" y="72" class="edge-text" text-anchor="middle">(no new ingestion this tick) → skip</text>

  <!-- source_a box -->
  <rect x="80" y="95" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="2"/>
  <rect x="80" y="95" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="80" y="111" width="200" height="6" fill="#16171e"/>
  <text x="180" y="111" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="80" y1="117" x2="280" y2="117" stroke="#9ece6a" stroke-width="1"/>
  <text x="180" y="137" class="name" font-size="14" fill="#d6ffdb">source_a</text>
  <text x="180" y="155" class="name" font-size="12" fill="#d6ffdb">@04-25</text>

  <!-- source_a -> stg_a edge + daemon callout for stg_a -->
  <path d="M 280 130 L 510 130" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="285" y="85" width="220" height="40" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="395" y="103" class="edge-text" text-anchor="middle">daemon evaluates rule for stg_a</text>
  <text x="395" y="117" class="edge-text" text-anchor="middle">no upstream newly updated → skip</text>

  <!-- stg_a box (x=510-710) -->
  <rect x="510" y="95" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="2"/>
  <rect x="510" y="95" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="510" y="111" width="200" height="6" fill="#16171e"/>
  <text x="610" y="111" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="510" y1="117" x2="710" y2="117" stroke="#9ece6a" stroke-width="1"/>
  <text x="610" y="137" class="name" font-size="14" fill="#d6ffdb">stg_a</text>
  <text x="610" y="155" class="name" font-size="12" fill="#d6ffdb">@04-25</text>

  <!-- stg_a -> mart_c edge (dashed) + daemon skip callout -->
  <path d="M 710 140 L 1060 290" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="775" y="190" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="885" y="206" class="edge-text" text-anchor="middle">daemon SKIPS mart_c entirely</text>
  <text x="885" y="222" class="edge-text" text-anchor="middle">automation_condition = None</text>
  <text x="885" y="237" class="edge-text" text-anchor="middle">(tag: latest_available → sensor drives it)</text>

  <!-- ===== Row 2: source_b + daemon callout + stg_b (moved RIGHT) ===== -->

  <!-- source_b box -->
  <rect x="80" y="420" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="2"/>
  <rect x="80" y="420" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="80" y="436" width="200" height="6" fill="#16171e"/>
  <text x="180" y="436" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="80" y1="442" x2="280" y2="442" stroke="#9ece6a" stroke-width="1"/>
  <text x="180" y="462" class="name" font-size="14" fill="#d6ffdb">source_b</text>
  <text x="180" y="480" class="name" font-size="12" fill="#d6ffdb">@03-30 (monthly)</text>

  <!-- daemon callout source_b (below) -->
  <rect x="60" y="505" width="240" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="180" y="521" class="edge-text" text-anchor="middle">daemon evaluates rule for source_b</text>
  <text x="180" y="537" class="edge-text" text-anchor="middle">source_b is not daemon-managed</text>
  <text x="180" y="552" class="edge-text" text-anchor="middle">(no new ingestion this tick) → skip</text>

  <!-- source_b -> stg_b edge (skipped) + daemon callout — edge extends to new stg_b x=700 -->
  <path d="M 280 455 L 700 455" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="370" y="370" width="220" height="40" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="480" y="388" class="edge-text" text-anchor="middle">daemon evaluates rule for stg_b</text>
  <text x="480" y="402" class="edge-text" text-anchor="middle">no upstream newly updated → skip</text>

  <!-- ===== Sensor-read arrows drawn BEFORE stg_b so stg_b paints on top ===== -->

  <!-- Dashed RED arrow from stg_a DOWN to sensor (straight line at x=610) -->
  <path d="M 610 165 L 610 660" class="edge-cps-read" marker-end="url(#arrow-red)"/>

  <!-- Dashed RED arrow from stg_b DOWN to sensor (straight line at x=800, new stg_b center) -->
  <!-- stg_b will be at x=700-900, center x=800. Arrow from bottom of stg_b at y=490 down to sensor top at y=660 -->
  <path d="M 800 490 L 800 660" class="edge-cps-read" marker-end="url(#arrow-red)"/>

  <!-- ===== stg_b box (NOW at x=700-900, center 800 — moved right so stg_a arrow goes straight) ===== -->
  <rect x="700" y="420" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="2"/>
  <rect x="700" y="420" width="200" height="22" rx="8" fill="#2a1f3a"/>
  <rect x="700" y="436" width="200" height="6" fill="#2a1f3a"/>
  <text x="800" y="436" class="tag-text" fill="#e0d4ff">tag: latest_available_source</text>
  <line x1="700" y1="442" x2="900" y2="442" stroke="#9ece6a" stroke-width="1"/>
  <text x="800" y="462" class="name" font-size="14" fill="#d6ffdb">stg_b</text>
  <text x="800" y="480" class="name" font-size="12" fill="#d6ffdb">@03-30</text>

  <!-- stg_b -> mart_c edge (dashed) + daemon skip callout -->
  <path d="M 900 450 L 1060 340" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="910" y="370" width="160" height="50" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="990" y="386" class="edge-text" text-anchor="middle">daemon SKIPS</text>
  <text x="990" y="400" class="edge-text" text-anchor="middle">mart_c entirely</text>
  <text x="990" y="414" class="edge-text" text-anchor="middle">(via stg_b path)</text>

  <!-- ===== Read-arrow callouts ABOVE the arrows (not to the side) ===== -->

  <!-- stg_a read-arrow callout: ON TOP of the arrow at x=610 -->
  <rect x="495" y="250" width="230" height="40" rx="4" fill="#16171e" stroke="#f7768e" stroke-width="1"/>
  <text x="610" y="268" class="edge-text" text-anchor="middle" fill="#ffd5d0">sensor reads stg_a partition state</text>
  <text x="610" y="282" class="edge-text" text-anchor="middle" fill="#ffd5d0">exact-match dep: @04-25 ✓</text>

  <!-- stg_b read-arrow callout: ON TOP of the arrow at x=800 -->
  <rect x="685" y="580" width="230" height="40" rx="4" fill="#16171e" stroke="#f7768e" stroke-width="1"/>
  <text x="800" y="598" class="edge-text" text-anchor="middle" fill="#ffd5d0">sensor reads stg_b partition state</text>
  <text x="800" y="612" class="edge-text" text-anchor="middle" fill="#ffd5d0">latest_available_source dep: @03-30</text>

  <!-- ===== mart_c box (right, materialized) ===== -->
  <rect x="1060" y="275" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="3"/>
  <rect x="1060" y="275" width="200" height="22" rx="8" fill="#2a1f3a"/>
  <rect x="1060" y="291" width="200" height="6" fill="#2a1f3a"/>
  <text x="1160" y="291" class="tag-text" fill="#e0d4ff">tag: latest_available</text>
  <line x1="1060" y1="297" x2="1260" y2="297" stroke="#9ece6a" stroke-width="1"/>
  <text x="1160" y="317" class="name" font-size="14" fill="#d6ffdb">mart_c</text>
  <text x="1160" y="335" class="name" font-size="12" fill="#d6ffdb">@04-25 ✅ materialized</text>

  <!-- ===== Cross-partition sensor (wider, at bottom center) ===== -->
  <rect x="500" y="660" width="380" height="60" rx="8" fill="#2a1f3a" stroke="#f7768e" stroke-width="2.5"/>
  <text x="690" y="684" class="name" font-size="14" fill="#ffd5d0">Cross-partition sensor</text>
  <text x="690" y="703" class="name" font-size="12" fill="#ffd5d0">tick (every 5 min) — target: mart_c (tagged latest_available)</text>

  <!-- ===== Write-arrow from sensor RIGHT EDGE, inverted L, ends at mart_c bottom-center ===== -->
  <path d="M 880 690 L 1160 690 L 1160 345" class="edge-cps-write" marker-end="url(#arrow-red)"/>

  <!-- Write-arrow callout ON TOP of the horizontal segment, centered with mart_c -->
  <rect x="1005" y="530" width="310" height="52" rx="4" fill="#16171e" stroke="#f7768e" stroke-width="1"/>
  <text x="1160" y="546" class="edge-text" text-anchor="middle" fill="#ffd5d0">sensor resolves deps and emits RunRequest</text>
  <text x="1160" y="562" class="edge-text" text-anchor="middle" fill="#ffd5d0">find_latest_available_partition(stg_b, "04-25") = @03-30</text>
  <text x="1160" y="577" class="edge-text" text-anchor="middle" fill="#ffd5d0">mart_c@04-25 built from stg_a@04-25 + stg_b@03-30</text>

  <!-- Footer -->
  <rect x="30" y="735" width="1280" height="20" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="50" y="750" class="footer-text">Daemon never participates in mart_c. All mart_c runs are driven by the cross-partition sensor on its 5-minute tick.</text>
</svg>
