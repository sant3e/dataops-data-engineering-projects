<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" style="background:#1a1b26">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7aa2f7"/>
    </marker>
    <style>
      .name { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; text-anchor: middle; }
      .tag-text { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 600; text-anchor: middle; }
      .edge-text { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: #c0caf5; }
      .footer-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #c0caf5; }
      .footer-mono { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 12px; fill: #c0caf5; }
      .edge { stroke: #7aa2f7; stroke-width: 2; fill: none; }
      .edge-skip { stroke: #565f89; stroke-width: 2; stroke-dasharray: 5 4; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="660" fill="#1a1b26"/>

  <!-- Ingestion sensor top -->
  <rect x="50" y="15" width="260" height="55" rx="8" fill="#2a1f3a" stroke="#bb9af7" stroke-width="2"/>
  <text x="180" y="37" class="name" font-size="14" fill="#e0d4ff">Ingestion sensor</text>
  <text x="180" y="56" class="name" font-size="12" fill="#e0d4ff">fires RunRequest for source_a@04-25</text>

  <!-- Arrow segments (split around callout) -->
  <path d="M 180 70 L 180 105" class="edge"/>
  <path d="M 180 165 L 180 200" class="edge" marker-end="url(#arrow)"/>

  <!-- Callout for source_a (on the arrow) -->
  <rect x="60" y="105" width="240" height="60" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="180" y="123" class="edge-text" text-anchor="middle">daemon evaluates rule for source_a</text>
  <text x="180" y="139" class="edge-text" text-anchor="middle">source_a is not daemon-managed</text>
  <text x="180" y="155" class="edge-text" text-anchor="middle">(ingestion sensor drives it) → skip</text>

  <!-- source_a box (tag N/A, just landed) -->
  <rect x="80" y="205" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="3"/>
  <rect x="80" y="205" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="80" y="221" width="200" height="6" fill="#16171e"/>
  <text x="180" y="221" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="80" y1="227" x2="280" y2="227" stroke="#9ece6a" stroke-width="1"/>
  <text x="180" y="247" class="name" font-size="14" fill="#d6ffdb">source_a</text>
  <text x="180" y="265" class="name" font-size="12" fill="#d6ffdb">@04-25 ✅ just landed</text>

  <!-- stg_a callout (above edge) -->
  <rect x="285" y="175" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="395" y="191" class="edge-text" text-anchor="middle">daemon evaluates rule for stg_a</text>
  <text x="395" y="207" class="edge-text" text-anchor="middle">eager_with_lookback → TRUE</text>
  <text x="395" y="222" class="edge-text" text-anchor="middle">(upstream newly updated) → submit run</text>

  <!-- source_a → stg_a edge -->
  <path d="M 280 240 L 510 240" class="edge" marker-end="url(#arrow)"/>

  <!-- stg_a box (tag N/A, materialized) -->
  <rect x="510" y="205" width="200" height="70" rx="8" fill="#1f3a2a" stroke="#9ece6a" stroke-width="3"/>
  <rect x="510" y="205" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="510" y="221" width="200" height="6" fill="#16171e"/>
  <text x="610" y="221" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="510" y1="227" x2="710" y2="227" stroke="#9ece6a" stroke-width="1"/>
  <text x="610" y="247" class="name" font-size="14" fill="#d6ffdb">stg_a</text>
  <text x="610" y="265" class="name" font-size="12" fill="#d6ffdb">@04-25 ✅ materialized</text>

  <!-- stg_a → mart_c edge (dashed - daemon isn't driving this) -->
  <path d="M 710 245 L 980 330" class="edge-skip" marker-end="url(#arrow)"/>

  <!-- Callout for mart_c (via stg_a path) - daemon skips -->
  <rect x="735" y="265" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="845" y="281" class="edge-text" text-anchor="middle">daemon SKIPS mart_c entirely</text>
  <text x="845" y="297" class="edge-text" text-anchor="middle">automation_condition = None</text>
  <text x="845" y="312" class="edge-text" text-anchor="middle">(tag: latest_available → sensor drives it)</text>

  <!-- source_b box (tag N/A, still @03-30) -->
  <rect x="80" y="400" width="200" height="70" rx="8" fill="#24283b" stroke="#565f89" stroke-width="2"/>
  <rect x="80" y="400" width="200" height="22" rx="8" fill="#16171e"/>
  <rect x="80" y="416" width="200" height="6" fill="#16171e"/>
  <text x="180" y="416" class="tag-text" fill="#7a8195">tag: N/A</text>
  <line x1="80" y1="422" x2="280" y2="422" stroke="#565f89" stroke-width="1"/>
  <text x="180" y="442" class="name" font-size="14" fill="#a9b1d6">source_b</text>
  <text x="180" y="460" class="name" font-size="12" fill="#a9b1d6">@03-30 (no new ingestion)</text>

  <!-- source_b -> stg_b edge skip + callout -->
  <path d="M 280 435 L 510 435" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="285" y="370" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="395" y="386" class="edge-text" text-anchor="middle">daemon evaluates rule for stg_b</text>
  <text x="395" y="402" class="edge-text" text-anchor="middle">no upstream newly updated → skip</text>

  <!-- stg_b box (tag latest_available_source, still @03-30) -->
  <rect x="510" y="400" width="200" height="70" rx="8" fill="#24283b" stroke="#565f89" stroke-width="2"/>
  <rect x="510" y="400" width="200" height="22" rx="8" fill="#2a1f3a"/>
  <rect x="510" y="416" width="200" height="6" fill="#2a1f3a"/>
  <text x="610" y="416" class="tag-text" fill="#e0d4ff">tag: latest_available_source</text>
  <line x1="510" y1="422" x2="710" y2="422" stroke="#565f89" stroke-width="1"/>
  <text x="610" y="442" class="name" font-size="14" fill="#a9b1d6">stg_b</text>
  <text x="610" y="460" class="name" font-size="12" fill="#a9b1d6">@03-30</text>

  <!-- source_b callout (below) -->
  <rect x="60" y="485" width="240" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="180" y="501" class="edge-text" text-anchor="middle">daemon evaluates rule for source_b</text>
  <text x="180" y="517" class="edge-text" text-anchor="middle">source_b is not daemon-managed</text>
  <text x="180" y="532" class="edge-text" text-anchor="middle">(no new ingestion this tick) → skip</text>

  <!-- stg_b → mart_c edge (dashed) + daemon skip callout -->
  <path d="M 710 435 L 980 375" class="edge-skip" marker-end="url(#arrow)"/>
  <rect x="735" y="370" width="220" height="52" rx="4" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="845" y="386" class="edge-text" text-anchor="middle">daemon SKIPS mart_c entirely</text>
  <text x="845" y="402" class="edge-text" text-anchor="middle">automation_condition = None</text>
  <text x="845" y="417" class="edge-text" text-anchor="middle">(via stg_b path — same skip reason)</text>

  <!-- mart_c box (still @04-24) -->
  <rect x="980" y="305" width="200" height="70" rx="8" fill="#24283b" stroke="#565f89" stroke-width="2"/>
  <rect x="980" y="305" width="200" height="22" rx="8" fill="#2a1f3a"/>
  <rect x="980" y="321" width="200" height="6" fill="#2a1f3a"/>
  <text x="1080" y="321" class="tag-text" fill="#e0d4ff">tag: latest_available</text>
  <line x1="980" y1="327" x2="1180" y2="327" stroke="#565f89" stroke-width="1"/>
  <text x="1080" y="347" class="name" font-size="14" fill="#a9b1d6">mart_c</text>
  <text x="1080" y="365" class="name" font-size="12" fill="#a9b1d6">@04-24 ⏳ waiting for sensor</text>

  <!-- Footer -->
  <rect x="30" y="555" width="1140" height="95" rx="6" fill="#16171e" stroke="#3d59a1" stroke-width="1"/>
  <text x="50" y="580" class="footer-text" font-weight="600">For assets tagged `latest_available`, the translator returns None for their automation_condition.</text>
  <text x="50" y="602" class="footer-text">The daemon's loop simply skips them — it has nothing to evaluate. On this tick the daemon fires stg_a like normal, but mart_c is not in its scope.</text>
  <text x="50" y="625" class="footer-text">Meanwhile the cross-partition sensor (runs every 5 min) has mart_c in its work queue; it will react separately on its next tick (see next image).</text>
  <text x="50" y="645" class="footer-mono">Rule for stg_a: (code_version_change) OR (eager_with_lookback) → eager TRUE → submit run.</text>
</svg>
